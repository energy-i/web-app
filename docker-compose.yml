services:
  postgres:
    image: postgres:17.5-alpine
    container_name: energyi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: energyi
    ports:
      - "5432:5432"
    volumes:
      - energyi_postgres_data:/var/lib/postgresql/data

volumes:
  energyi_postgres_data:
